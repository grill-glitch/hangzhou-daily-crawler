name: Test Crawl

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install requests
        run: pip install requests
        
      - name: Test script
        run: |
          python3 -c "print('Hello from GitHub Actions!')"
          
      - name: Test crawler import
        run: |
          python3 -c "import dskb_crawler_v2; print('Crawler module OK')"
          
      - name: List files
        run: ls -la
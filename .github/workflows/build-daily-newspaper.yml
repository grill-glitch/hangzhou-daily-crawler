name: Build Daily Newspaper

on:
  schedule:
    # 每天凌晨 1:30 运行（抓取前一天的报纸）
    - cron: '30 1 * * *'
  workflow_dispatch:
    # 支持手动触发，可指定日期
    inputs:
      date_str:
        description: '抓取日期 (YYYY-MM-DD)'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd hangzhou-daily-crawler
        pip install -r requirements.txt 2>/dev/null || pip install requests
    
    - name: Determine date to fetch
      id: date
      run: |
        if [ -n "${{ github.event.inputs.date_str }}" ]; then
          echo "date_str=${{ github.event.inputs.date_str }}" >> $GITHUB_OUTPUT
        else
          # 默认抓取昨天的日期
          date_str=$(date -d yesterday +%Y-%m-%d)
          echo "date_str=$date_str" >> $GITHUB_OUTPUT
        fi
        echo "Fetching date: ${{ steps.date.outputs.date_str }}"
    
    - name: Crawl newspaper
      working-directory: hangzhou-daily-crawler
      run: |
        python3 dskb_crawler_v2.py ${{ steps.date.outputs.date_str }}
    
    - name: Generate Markdown with TOC
      working-directory: hangzhou-daily-crawler
      run: |
        python3 merge_to_md.py ${{ steps.date.outputs.date_str }} --title "都市快报 ${{ steps.date.outputs.date_str }}"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dskb-${{ steps.date.outputs.date_str }}
        path: |
          hangzhou-daily-crawler/dskb_${{ steps.date.outputs.date_str }}.json
          hangzhou-daily-crawler/output/dskb_${{ steps.date.outputs.date_str }}.md
          hangzhou-daily-crawler/dskb_${{ steps.date.outputs.date_str }}/  # 单篇文章目录（如果存在）
    
    - name: Commit and push to repository
      if: github.event_name == 'schedule'  # 仅定时任务自动推送
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        cd hangzhou-daily-crawler
        
        # 添加生成的文件
        git add dskb_${{ steps.date.outputs.date_str }}.json
        git add output/dskb_${{ steps.date.outputs.date_str }}.md
        git add dskb_${{ steps.date.outputs.date_str }}/ 2>/dev/null || true
        
        # 提交（如果文件有变化）
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "build: auto-generate ${{ steps.date.outputs.date_str }} newspaper"
          git push origin HEAD:${{ github.ref_name }}
        fi

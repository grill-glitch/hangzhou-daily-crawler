name: Deploy to Pages

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch: {}
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Determine date
        id: date
        run: |
          DATE=$(date -d yesterday +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
      - name: Crawl
        run: python3 dskb_crawler_v2.py ${{ steps.date.outputs.date }}
      - name: Summaries
        run: |
          DATE=${{ steps.date.outputs.date }}
          [ -f "dskb_${DATE}.json" ] && {
            python3 generate_summary.py "$DATE" > "summary_${DATE}.txt"
            python3 extract_short_news.py "$DATE" > "short_news_${DATE}.txt"
          }
      - name: Prepare site
        run: |
          mkdir -p _site
          cp dskb_*.json _site/ 2>/dev/null || true
          cp summary_*.txt _site/ 2>/dev/null || true
          cp short_news_*.txt _site/ 2>/dev/null || true
          cd _site
          python3 -c "
import json, os
idx = {}
for f in os.listdir('.'):
  if f.startswith('dskb_') and f.endswith('.json'):
    date = f[5:-5]
    with open(f) as fp: data = json.load(fp)
    idx[date] = {
      'total_sections': data.get('total_sections',0),
      'total_articles': data.get('total_articles',0),
      'total_words': sum(a.get('word_count',0) for a in data.get('articles',[])),
      'sections': data.get('sections',[])
    }
    if os.path.exists(f'summary_{date}.txt'): idx[date]['summary'] = True
    if os.path.exists(f'short_news_{date}.txt'): idx[date]['short_news'] = True
with open('data.json','w',encoding='utf-8') as f: json.dump(idx,f,ensure_ascii=False,indent=2)
print(f\"Created data.json with {len(idx)} dates\")"
          cat > index.html << 'EOF2'
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Hangzhou Daily Archive</title></head>
<body><h1>Archive</h1><p>Data available: <pre>$(ls dskb_*.json 2>/dev/null | sed 's/^/- /')</pre></p></body></html>
EOF2
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - uses: actions/deploy-pages@v4

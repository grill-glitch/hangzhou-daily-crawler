name: Deploy to Pages

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 2 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: echo "Hello from Deploy workflow"
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        uses: actions/deploy-pages@v4
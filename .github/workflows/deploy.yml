name: 都市快报自动发布

on:
  schedule:
    # 每天凌晨 2:00 自动运行（UTC 时间，对应北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - master
    paths:
      - 'dskb_crawler_v2.py'
      - 'merge_to_md.py'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Hexo CLI 和依赖
        run: |
          npm install -g hexo-cli
          npm ci

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 获取今日日期
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: 运行爬虫抓取今日数据
        run: |
          python3 dskb_crawler_v2.py ${{ steps.date.outputs.date }} --individual

      - name: 准备博客文章目录
        run: |
          mkdir -p source/_posts
          # 清理旧的当日文章（避免重复）
          rm -f source/_posts/*${{ steps.date.outputs.date }}*.md

      - name: 检查文件列表
        run: |
          echo "当前目录：$(pwd)"
          ls -la
          echo "检查 JSON 文件："
          ls -la dskb_*.json 2>/dev/null || echo "未找到 dskb_*.json"
          echo "检查单篇文章目录："
          ls -la dskb_${{ steps.date.outputs.date }}/ 2>/dev/null || echo "未找到单篇文章目录"

      - name: 转换为 Hexo 博客文章
        run: |
          python3 << 'EOF'
          import json
          import os
          import re
          from datetime import datetime

          date_str = "${{ steps.date.outputs.date }}"
          json_file = f"dskb_{date_str}.json"

          if not os.path.exists(json_file):
              print(f"错误：{json_file} 不存在，可能是今日数据尚未准备好")
              exit(1)

          with open(json_file, 'r', encoding='utf-8') as f:
              data = json.load(f)

          posts_dir = "source/_posts"
          os.makedirs(posts_dir, exist_ok=True)

          def slugify(text):
              import re
              text = text.lower()
              text = re.sub(r'[^\w\u4e00-\u9fff\-]+', '-', text)
              text = re.sub(r'-+', '-', text)
              return text.strip('-')

          for article in data['articles']:
              title = article['title']
              author = article.get('author', '未知作者')
              section = article.get('section_name', '未分类')
              publish_date = article.get('publish_date', date_str)
              content = article.get('content', '').strip()
              original_url = article.get('original_url', '')

              # 生成文件名
              safe_title = slugify(title)
              filename = f"{date_str}-{safe_title}.md"
              filepath = os.path.join(posts_dir, filename)

              # Hexo Front Matter (YAML-safe)
              front_matter = (
                  '---\n'
                  f"title: {json.dumps(title, ensure_ascii=False)}\n"
                  f"date: {publish_date} 12:00:00\n"
                  f"author: {json.dumps(author, ensure_ascii=False)}\n"
                  f"categories: [{json.dumps(section, ensure_ascii=False)}]\n"
                  f"tags: [{json.dumps('都市快报', ensure_ascii=False)}, {json.dumps('杭州新闻', ensure_ascii=False)}]\n"
                  "layout: post\n"
                  "---\n\n"
              )

              # Markdown 内容
              md_content = f"{front_matter}# {title}\n\n"
              md_content += f"> **作者**: {author} | **版块**: {section} | **字数**: {article.get('word_count', 0)}\n\n"
              if original_url:
                  md_content += f"[原文链接]({original_url})\n\n"
              md_content += "## 正文\n\n"
              md_content += content.replace('\n\n', '\n\n').strip()
              md_content += "\n\n---\n\n"
              md_content += f"> 来源：[杭州都市快报]({original_url}) | 抓取时间：{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}"

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(md_content)

              print(f"✓ 创建文章：{filename}")

          print(f"\n✅ 共转换 {len(data['articles'])} 篇文章")
          EOF

      - name: 构建 Hexo 站点
        run: |
          echo "当前工作目录：$(pwd)"
          ls -la
          echo "检查 _config.yml："
          test -f _config.yml && echo "_config.yml 存在" || echo "_config.yml 不存在！"
          echo "检查 source 目录："
          ls -la source/
          echo "检查 source/_posts："
          ls -la source/_posts/ | head -10
          hexo --version
          hexo clean
          hexo generate -u
          echo "public_dir=public" >> $GITHUB_ENV

      - name: 设置 Pages 部署
        uses: actions/configure-pages@v4

      - name: 上传 Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

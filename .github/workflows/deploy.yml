name: Deploy to Pages

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 2 * * *'
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Determine date to crawl
        id: date
        run: |
          DATE=$(date -d "yesterday" +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          
      - name: Crawl Hangzhou Daily
        run: |
          DATE="${{ steps.date.outputs.date }}"
          echo "Crawling $DATE..."
          python3 dskb_crawler_v2.py "$DATE"
          
      - name: Clean navigation artifacts
        run: |
          DATE="${{ steps.date.outputs.date }}"
          if [ -f "dskb_${DATE}.json" ]; then
            echo "Cleaning navigation artifacts..."
            python3 fix_navigation.py
          else
            echo "No data for $DATE, skipping cleanup"
          fi
          
      - name: Generate markdown pages
        run: |
          DATE="${{ steps.date.outputs.date }}"
          if [ -f "dskb_${DATE}.json" ]; then
            python3 generate_summary.py "$DATE" > "summary_${DATE}.txt"
            python3 extract_short_news.py "$DATE" > "short_news_${DATE}.txt"
            python3 merge_to_md.py "$DATE" --output _site
          else
            echo "No data for $DATE, skipping markdown generation"
          fi
          
      - name: Prepare site
        run: python3 scripts/prepare_site.py
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Add CNAME
        run: echo "grill-glitch.github.io" > _site/CNAME
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
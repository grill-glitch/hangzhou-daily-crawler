<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .date-list {
            list-style: none;
            padding: 0;
        }
        .date-list li {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }
        .date-list a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
        }
        .date-list a:hover {
            color: #3498db;
        }
        .rss-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff9800;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .rss-link:hover {
            background: #e68900;
        }
        .description {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.8em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    
    <p>欢迎使用都市快报 RSS 订阅服务。以下是所有可用的日期：</p>
    
    <ul class="date-list">
        {% for d in dates %}
        <li>
            <a href="/daily/{{ d }}">{{ d }}</a>
            <div class="description">点击查看当日文章列表</div>
        </li>
        {% endfor %}
    </ul>

    {% if dates %}
    <a class="rss-link" href="/rss">📡 订阅最新文章 RSS</a>
    {% else %}
    <p>暂无数据</p>
    {% endif %}

    <div class="footer">
        <p>数据来源：杭州日报报业集团数字报纸</p>
        <p>本服务仅供学习研究使用，版权归原作者所有</p>
        <p><a href="https://github.com/grill-glitch/hangzhou-daily-crawler">GitHub 仓库</a></p>
    </div>
</body>
</html>

# Hexo 配置
title: 都市快报每日精选
subtitle: Hangzhou Daily News
description: 自动抓取杭州都市快报每日新闻内容
author: bigbang
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://grill-glitch.github.io/hangzhou-daily-crawler
root: /hangzhou-daily-crawler

# 目录
source_dir: source
public_dir: public

# 文章/文件目录
source:
  - _data   # 数据文件
  - _posts  # 博客文章
  - _drafts # 草稿
  - _config.yml

# 代码块高亮
highlight:
  enable: true
  line_number: false
  tab_replace: ''

# 主题（使用默认处理器，不需要额外主题）
theme: landscape

# 部署配置
deploy:
  type: git
  repo: https://github.com/grill-glitch/hangzhou-daily-crawler.git
  branch: gh-pages
  message: "Deploy: {{ now('YYYY-MM-DD HH:mm:ss') }}"
